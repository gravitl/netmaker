syntax = "proto3";

package netmaker.siem;

import "google/protobuf/struct.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/gravitl/netmaker/grpc/siem";

// ============================================================
// BUILD COMMAND:
//
// protoc --go_out=. --go_opt=paths=source_relative --go-grpc_out=. --go-grpc_opt=paths=source_relative grpc/siem/siem.proto
//
// ============================================================

// ============================================================
// MESSAGES
// ============================================================

/**
 * Sent by the netmaker server to instruct the exporter to begin
 * forwarding events to the specified SIEM provider.
 */
message InitSIEMRequest {
  // SIEM provider identifier (e.g. "splunk", "elastic", "datadog", "sentinel")
  string provider_id = 1;

  // Provider-specific configuration (e.g. endpoint, token, index)
  google.protobuf.Struct config = 2;
}

/**
 * Shared response for both Init and Terminate RPCs.
 */
message SIEMResponse {
  bool success = 1;
  string error = 2;
}

// ============================================================
// SERVICE
// ============================================================

/**
 * Unary RPCs called by the netmaker server to control SIEM export
 * on the netmaker exporter.
 */
service SIEMService {
  // Instruct the exporter to start forwarding events to the given SIEM provider.
  rpc InitSIEM(InitSIEMRequest) returns (SIEMResponse);

  // Instruct the exporter to stop all SIEM forwarding.
  rpc TerminateSIEM(google.protobuf.Empty) returns (SIEMResponse);
}
