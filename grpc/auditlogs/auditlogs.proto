syntax = "proto3";

package netmaker.auditlogs;

import "google/protobuf/struct.proto";

option go_package = "github.com/gravitl/netmaker/grpc/auditlogs";

// ============================================================
// BUILD COMMAND:
//
// protoc --go_out=. --go_opt=paths=source_relative --go-grpc_out=. --go-grpc_opt=paths=source_relative grpc/auditlogs/auditlogs.proto
//
// ============================================================

// ============================================================
// AUDIT LOG EVENT
// ============================================================

/**
 * Audit log event generated by the netmaker server.
 * Mirrors the schema.Event struct.
 */
message AuditLogEvent {
  string id = 1;

  // Action performed (e.g. "CREATE", "UPDATE", "DELETE") — maps to schema.Action
  string action = 2;

  // Who initiated the action (maps to schema.Origin: "DASHBOARD", "API", "NMCTL", "CLIENT-APP")
  string origin = 3;

  // User or entity that triggered the action
  string triggered_by = 4;

  // Network the event is scoped to (empty for global events)
  string network_id = 5;

  // Structured JSON blobs — map to datatypes.JSON fields in schema.Event
  google.protobuf.Struct source = 6;
  google.protobuf.Struct target = 7;
  google.protobuf.Struct diff = 8;

  // Timestamp (milliseconds since Unix epoch)
  int64 ts_ms = 9;
}

// ============================================================
// BATCHING AND STREAMING
// ============================================================

/**
 * Envelope sent by the netmaker server containing multiple AuditLogEvents.
 */
message AuditLogEnvelope {
  repeated AuditLogEvent events = 1;
}

/**
 * Response from the exporter acknowledging receipt of a batch.
 */
message AuditLogResponse {
  bool success = 1;
  string error = 2;
}

// ============================================================
// SERVICE
// ============================================================

/**
 * Bidirectional streaming:
 *  - Netmaker server continuously sends AuditLogEnvelope batches.
 *  - Exporter replies with AuditLogResponse ACKs.
 */
service AuditLogService {
  rpc StreamAuditLogs(stream AuditLogEnvelope) returns (stream AuditLogResponse);
}
